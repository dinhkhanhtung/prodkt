<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SellEasy Feature Graphic</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1024px;
            height: 500px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            color: white;
            padding: 20px;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            background: white;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .logo img {
            width: 80px;
            height: 80px;
        }

        h1 {
            font-size: 48px;
            margin: 0;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .tagline {
            font-size: 24px;
            margin: 0;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .features {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 20px;
        }

        .feature {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .feature-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feature-text {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">
            <img src="app_icon.png" alt="SellEasy Logo">
        </div>
        <h1>SellEasy</h1>
        <div class="tagline">Ứng dụng Quản lý Bán hàng Thông minh</div>
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-text">Quản lý Kho</div>
            </div>
            <div class="feature">
                <div class="feature-icon">💰</div>
                <div class="feature-text">Doanh Thu</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📈</div>
                <div class="feature-text">Báo Cáo</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div class="feature-text">An Toàn</div>
            </div>
        </div>
    </div>
</body>

</html>
